<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EVEN</title>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      background: #000;
      color: #f2f2ee;
      font-family: "Manrope", -apple-system, BlinkMacSystemFont, sans-serif;

      scroll-snap-type: y mandatory;
      overflow-y: scroll;
      scroll-behavior: auto;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* HERO */
    .hero {
      height: 100vh;
      position: relative;
      isolation: isolate;
      overflow: hidden;

      scroll-snap-align: start;
      scroll-snap-stop: always;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(
          180deg,
          rgba(0,0,0,0.1) 0%,
          rgba(0,0,0,0.18) 50%,
          rgba(0,0,0,0.82) 100%
        ),
        url("assets/apartment_nyc_hero.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    /* TOP LOGO (TRUE CENTER) */
    .top-logo {
      position: absolute;
      top: 48px;
      left: 0;
      width: 100%;

      display: flex;
      justify-content: center;

      font-size: clamp(1.5rem, 3vw, 1.5rem);
      letter-spacing: 0.30em;
      text-transform: uppercase;
      font-weight: 500;
      color: rgba(242,242,238,0.92);

      z-index: 1;
      animation: fadeIn 0.8s ease;
    }

    /* BOTTOM CTA (ALIGNED PERFECTLY WITH LOGO) */
    .bottom-cta {
      position: absolute;
      bottom: 42px;
      left: 0;
      width: 100%;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      gap: 12px;
      z-index: 1;

      animation: fadeIn 0.8s ease 0.15s both;
    }

    .text-button {
      font-size: 0.8rem;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: rgba(242,242,238,0.8);
      border-bottom: 1px solid rgba(255,255,255,0.35);
      padding-bottom: 4px;
      transition: 0.25s ease;
    }

    .text-button:hover {
      color: #fff;
      border-color: rgba(255,255,255,0.85);
      transform: translateY(-2px);
    }

    .scroll-cue {
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      color: rgba(242,242,238,0.35);
      animation: pulse 2.5s infinite;
    }

    /* SECOND SECTION */
    .container {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;

      scroll-snap-align: start;
      scroll-snap-stop: always;
    }

    .main {
      width: 100%;
      max-width: 1100px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      padding: 0 24px;
      align-items: center;
    }

    .product {
      display: flex;
      justify-content: center;
    }

    .product img {
      width: 70%;
      max-width: 320px;
      animation: floatCan 5s ease-in-out infinite;
    }

    .section-title {
      font-size: 2rem;
      margin-bottom: 12px;
    }

    .section-subtext {
      font-size: 0.85rem;
      color: rgba(242,242,238,0.65);
      margin-bottom: 24px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      font-size: 0.82rem;
    }

    /* ANIMATIONS */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes floatCan {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes pulse {
      0%,100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .main {
        grid-template-columns: 1fr;
        gap: 40px;
      }

      .product img {
        width: 50%;
        max-width: 180px;
      }
    }

  </style>
</head>

<body>

  <section class="hero">
    <div class="top-logo">EVEN</div>

    <div class="bottom-cta">
      <a href="sms:+18573170011?body=I%20want%20EVEN" class="text-button">
        Text for access
      </a>
      <a href="#formula" class="scroll-cue">Formula</a>
    </div>
  </section>

  <section class="container" id="formula">
    <div class="main">

      <div class="product">
        <img src="assets/hero-can.png" />
      </div>

      <div>
        <h2 class="section-title">Daily.</h2>

        <p class="section-subtext">
          Focus, hydration, and recovery without the spike.
        </p>

        <div class="row"><span>Caffeine</span><span>50 mg</span></div>
        <div class="row"><span>L-theanine</span><span>75 mg</span></div>
        <div class="row"><span>Electrolytes</span><span>Na+, K+, Mg2+</span></div>
        <div class="row"><span>Vitamins</span><span>B6, B12, C, D3</span></div>
        <div class="row"><span>Flavor</span><span>Citrus Green Tea</span></div>

      </div>

    </div>
  </section>

</body>
</html>
