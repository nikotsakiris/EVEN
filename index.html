<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EVEN</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #000;
      color: #f2f2ee;
      font-family: "Inter", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 24px;
      min-height: 100vh;
      display: flex;
      align-items: center;
    }

    .main {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
    }

    .product {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .product img {
      width: 70%;
      max-width: 320px;
      height: auto;
    }

    .info {
      max-width: 420px;
      width: 100%;
    }

    .title {
      font-size: clamp(2rem, 3vw, 3rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
      margin: 0 0 14px;
    }

    .subtext {
      margin: 0 0 24px;
      color: rgba(242, 242, 238, 0.72);
      font-size: 0.92rem;
      line-height: 1.6;
    }

    .nutrition {
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 0.88rem;
    }

    .row span:first-child {
      color: rgba(242, 242, 238, 0.9);
    }

    .row span:last-child {
      color: rgba(242, 242, 238, 0.65);
      text-align: right;
    }

    sup {
      font-size: 0.6em;
      opacity: 0.6;
    }

    .cta {
      margin-top: 24px;
    }

    .text-button {
      display: inline-block;
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(242, 242, 238, 0.6);
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      padding-bottom: 4px;
      transition: all 0.2s ease;
    }

    .text-button:hover {
      color: #fff;
      border-bottom: 1px solid rgba(255, 255, 255, 0.6);
    }

    /* MOBILE FIXED */
    @media (max-width: 768px) {
      .container {
        padding: 20px 16px;
        min-height: auto;
        align-items: flex-start;
      }

      .main {
        grid-template-columns: 1fr;
        gap: 28px;
      }

      .product img {
        width: 48%;
        max-width: 180px;
        margin: 0 auto;
      }

      .info {
        margin: 0 auto;
        max-width: 100%;
        text-align: center;
      }

      .subtext {
        max-width: 280px;
        margin: 0 auto 18px;
      }

      .row {
        text-align: left;
      }

      .cta {
        margin-top: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="main">

      <!-- IMAGE -->
      <div class="product">
        <img src="assets/hero-can.png" alt="EVEN can" />
      </div>

      <!-- INFO -->
      <div class="info">
        <h1 class="title">Stay even.</h1>

        <p class="subtext">
          Built for consistency.
        </p>

        <div class="nutrition">
          <div class="row"><span>Caffeine</span><span>50 mg</span></div>
          <div class="row"><span>L-theanine</span><span>75 mg</span></div>
          <div class="row"><span>Electrolytes</span><span>Na<sup>+</sup>, K<sup>+</sup>, Mg<sup>2+</sup></span></div>
          <div class="row"><span>Vitamins</span><span>B6, B12, C, D3</span></div>
          <div class="row"><span>Flavor</span><span>Greek Mastic Gum, Lemon, Mint</span></div>
        </div>

        <!-- CTA -->
        <div class="cta">
          <a href="sms:+18573170011?body=I%20want%20EVEN" class="text-button">
            Text for access
          </a>
        </div>

      </div>

    </div>
  </div>
</body>
</html>
