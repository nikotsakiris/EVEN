<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EVEN</title>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      background: #000;
      color: #f2f2ee;
      font-family: "Manrope", -apple-system, BlinkMacSystemFont, sans-serif;
      scroll-snap-type: y mandatory;
      overflow-y: scroll;
      scroll-behavior: auto;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .hero {
      height: 100vh;
      position: relative;
      isolation: isolate;
      overflow: hidden;
      scroll-snap-align: start;
      scroll-snap-stop: always;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        url("assets/apartment_nyc_hero.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    .top-logo {
      position: absolute;
      top: 48px;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      font-size: 1.5rem;
      letter-spacing: 0.30em;
      text-transform: uppercase;
      font-weight: 500;
      color: rgba(242,242,238,0.92);
      z-index: 1;
      animation: fadeIn 0.8s ease;
    }

    .bottom-cta {
      position: absolute;
      bottom: 42px;
      left: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      z-index: 1;
      animation: fadeIn 0.8s ease 0.15s both;
    }

    .text-button {
      font-size: 0.8rem;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: rgba(242,242,238,0.8);
      border-bottom: 1px solid rgba(255,255,255,0.35);
      padding-bottom: 4px;
      transition: 0.25s ease;
    }

    .text-button:hover {
      color: #fff;
      border-color: rgba(255,255,255,0.85);
      transform: translateY(-2px);
    }

    .scroll-cue {
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      color: rgba(242,242,238,0.35);
      animation: pulse 2.5s infinite;
    }

    .container {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      overflow: hidden;
    }

    .main {
      width: 100%;
      max-width: 1100px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      padding: 0 24px;
      align-items: center;
    }

    .product {
      display: flex;
      justify-content: center;
    }

    .product img {
      width: 70%;
      max-width: 320px;
      animation: floatCan 5s ease-in-out infinite;
    }

    .formula-copy {
      overflow: hidden;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 32px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      font-size: 0.82rem;

      opacity: 0;
      transform: translateX(-90px);
      filter: blur(6px);
    }

    .container.in-view .row {
      animation: stemFromCan 1.15s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .container.in-view .row:nth-child(1) { animation-delay: 0.12s; }
    .container.in-view .row:nth-child(2) { animation-delay: 0.30s; }
    .container.in-view .row:nth-child(3) { animation-delay: 0.48s; }
    .container.in-view .row:nth-child(4) { animation-delay: 0.66s; }

    .row span:first-child {
      color: rgba(242,242,238,0.88);
      letter-spacing: 0.02em;
    }

    .row span:last-child {
      color: rgba(242,242,238,0.58);
      text-align: right;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes floatCan {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes pulse {
      0%,100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }

    @keyframes stemFromCan {
      from {
        opacity: 0;
        transform: translateX(-90px);
        filter: blur(6px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
        filter: blur(0);
      }
    }

    @media (max-width: 768px) {
      .main {
        grid-template-columns: 1fr;
        gap: 40px;
      }

      .product img {
        width: 50%;
        max-width: 180px;
      }

      .hero::before {
  background-size: 140%;
  background-position: center 30%;
}

      .row {
        transform: translateY(28px);
      }

      .container.in-view .row {
        animation-name: stemUpMobile;
      }

      @keyframes stemUpMobile {
        from {
          opacity: 0;
          transform: translateY(28px);
          filter: blur(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
          filter: blur(0);
        }
      }
    }
  </style>
</head>

<body>

  <section class="hero">
    <div class="top-logo">EVEN</div>

    <div class="bottom-cta">
      <a href="sms:+18573170011?body=I%20want%20EVEN" class="text-button">
        Text for access
      </a>
      <a href="#formula" class="scroll-cue">Formula</a>
    </div>
  </section>

  <section class="container" id="formula">
    <div class="main">
      <div class="product">
        <img src="assets/hero-can.png" alt="EVEN can" />
      </div>

      <div class="formula-copy">
        <div class="row"><span>Focus</span><span>Green Tea Caffeine, L-theanine</span></div>
        <div class="row"><span>Recovery</span><span>Electrolytes</span></div>
        <div class="row"><span>Resilience</span><span>Vitamins (B6, B12, C, D3)</span></div>
        <div class="row"><span>Flavor</span><span>Citrus Green Tea</span></div>
      </div>
    </div>
  </section>

  <script>
    const formulaSection = document.querySelector("#formula");

    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            formulaSection.classList.add("in-view");
          }
        });
      },
      {
        threshold: 0.65
      }
    );

    observer.observe(formulaSection);
  </script>

</body>
</html>
