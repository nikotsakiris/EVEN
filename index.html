<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVEN</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #000;
  color: #f2f2ee;
  font-family: "Inter", sans-serif;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 60px 24px;
}

/* DESKTOP LAYOUT */
.main {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: center;
}

/* IMAGE */
.product {
  display: flex;
  justify-content: center;
}

.product img {
  width: 70%;
  max-width: 320px;
}

/* RIGHT SIDE */
.info {
  max-width: 420px;
}

/* TITLE */
.title {
  font-size: clamp(2rem, 3vw, 3rem);
  letter-spacing: -0.05em;
  margin-bottom: 30px;
}

/* NUTRITION */
.nutrition {
  border-top: 1px solid rgba(255,255,255,0.1);
}

.row {
  display: flex;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  font-size: 0.9rem;
}

/* EMAIL SECTION */
.email {
  margin-top: 40px;
}

.email input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.4);
  padding: 10px 0;
  color: white;
  font-size: 0.9rem;
  outline: none;
}

/* MOBILE */
@media (max-width: 768px) {

  .main {
    grid-template-columns: 1fr;
    text-align: center;
  }

  .product img {
    width: 50%;
    margin: 0 auto;
  }

  .info {
    margin: 0 auto;
  }

  .row {
    justify-content: space-between;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="main">

    <!-- LEFT IMAGE -->
    <div class="product">
      <img src="assets/hero-can.png" alt="EVEN can">
    </div>

    <!-- RIGHT INFO -->
    <div class="info">

      <div class="title">Stay even.</div>

      <div class="nutrition">
        <div class="row"><span>Serving</span><span>1 can</span></div>
        <div class="row"><span>Caffeine</span><span>50 mg</span></div>
        <div class="row"><span>L-theanine</span><span>75 mg</span></div>
        <div class="row"><span>Electrolytes</span><span>Yes</span></div>
        <div class="row"><span>Vitamins</span><span>Daily</span></div>
        <div class="row"><span>Flavor</span><span>Greek Mastic Gum</span></div>
      </div>

      <div class="email">
        <input type="email" placeholder="Email address">
      </div>

    </div>

  </div>

</div>

</body>
</html>
